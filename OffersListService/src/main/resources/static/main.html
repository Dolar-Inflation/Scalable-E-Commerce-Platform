<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров | MARALDS</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
        }

        /* Сетка товаров */
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Карточка товара */
        .product-card {
            background: white;
            border-radius: 12px;
            width: 280px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 10px 0;
            height: 2.4em; /* Ограничение высоты заголовка */
            overflow: hidden;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: auto;
        }

        .buy-button:hover {
            background-color: #34495e;
        }

        /* Адаптивность для мобилок */
        @media (max-width: 600px) {
            .product-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="username-box" style="
    position: fixed;
    top: 20px;
    right: 20px;
    font-weight: bold;
    color: #2c3e50;
"></div>

<h1>Витрина товаров MARALDS</h1>

<div class="product-grid">

    <!-- Товар 1 -->
    <div class="product-card">
        <div class="product-image">Фото товара</div>
        <div class="product-info">
            <div class="product-title">Стул Mara Эмеральд (Велюр)</div>
            <div class="product-price">145.00 BYN</div>
            <button class="buy-button">В корзину</button>
        </div>
    </div>

    <!-- Товар 2 -->
    <div class="product-card">
        <div class="product-image">Фото товара</div>
        <div class="product-info">
            <div class="product-title">Постер Marald van Haasteren "Baroness"</div>
            <div class="product-price">89.90 BYN</div>
            <button class="buy-button">В корзину</button>
        </div>
    </div>

    <!-- Товар 3 -->
    <div class="product-card">
        <div class="product-image">Фото товара</div>
        <div class="product-info">
            <div class="product-title">Набор глубоководных приманок "Maraldi"</div>
            <div class="product-price">42.50 BYN</div>
            <button class="buy-button">В корзину</button>
        </div>
    </div>

    <!-- Товар 4 -->
    <div class="product-card">
        <div class="product-image">Фото товара</div>
        <div class="product-info">
            <div class="product-title">Стол обеденный Dark Emerald</div>
            <div class="product-price">310.00 BYN</div>
            <button class="buy-button">В корзину</button>
        </div>
    </div>


</div>
<script>
    async function loadUser() {
        const response = await fetch('/api/me', {
            credentials: 'include'
        });

        if (!response.ok) {
            document.getElementById("username-box").textContent = "Не авторизован";
            return;
        }

        const data = await response.json();
        document.getElementById("username-box").textContent =
            "Пользователь: " + data.name;
    }

    loadUser();
</script>

</body>
</html>
